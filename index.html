<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduFlex Global — Your Compass to Success</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js" crossorigin="anonymous"></script>
    <style>
      :root {
        --accent: #EE5A2B;
        --accent-soft: #FFE7DD;
        --ink: #1a1714;
        --ink-2: #27272a;
        --paper: #fffdf9;
        --paper-2: #fdf9f5;
        --paper-3: #f5f0eb;
        --rule: #e8e0d8;
        --muted: #a09585;
      }
      html { scroll-behavior: smooth; }
      body {
        background: var(--paper);
        color: var(--ink);
        font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
        font-feature-settings: "ss01", "cv11";
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }
      .font-display { font-family: "Inter", sans-serif; font-weight: 900; font-style: italic; letter-spacing: -0.04em; text-transform: uppercase; }
      .font-mono { font-family: "JetBrains Mono", ui-monospace, monospace; }
      .font-serif { font-family: "Fraunces", serif; }
      .tracking-mega { letter-spacing: 0.4em; }
      .tracking-ultra { letter-spacing: 0.6em; }
      .accent-text { color: var(--accent); }
      .accent-bg { background: var(--accent); }
      .accent-border { border-color: var(--accent); }
      .accent-soft-bg { background: var(--accent-soft); }
      .rule-border { border-color: var(--rule); }
      .text-ink { color: var(--ink); }
      .grain { position: relative; }
      .grain::after {
        content: ""; position: absolute; inset: 0; pointer-events: none; opacity: 0.04;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
        mix-blend-mode: multiply;
      }
      .marquee { display: flex; overflow: hidden; mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent); }
      .marquee-track { display: flex; gap: 4rem; padding-right: 4rem; animation: marquee 40s linear infinite; }
      @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
      @keyframes float-y { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
      @keyframes spin-slow { to { transform: rotate(360deg); } }
      @keyframes spin-rev { to { transform: rotate(-360deg); } }
      .animate-float { animation: float-y 5s ease-in-out infinite; }
      .animate-spin-slow { animation: spin-slow 60s linear infinite; }
      .animate-spin-rev { animation: spin-rev 40s linear infinite; }
      .clip-arrow { clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 50%, calc(100% - 16px) 100%, 0 100%); }
      input::placeholder, textarea::placeholder { color: var(--muted); }

      /* Dark hero variant */
      .hero-dark { background: var(--ink); color: white; }
      .hero-dark .rule { border-color: rgba(255,255,255,0.08); }

      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 0; }
      ::-webkit-scrollbar-track { background: var(--paper-2); }

      /* ========== MIND-BLOWING ANIMATIONS ========== */
      /* 3D Perspective Container */
      .perspective-container { perspective: 1000px; }
      .preserve-3d { transform-style: preserve-3d; }

      /* Animated Gradient Orbs */
      @keyframes orb-float-1 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        25% { transform: translate(50px, -30px) scale(1.1); }
        50% { transform: translate(20px, 20px) scale(0.95); }
        75% { transform: translate(-30px, 10px) scale(1.05); }
      }
      @keyframes orb-float-2 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(-40px, 30px) scale(1.15); }
        66% { transform: translate(30px, -20px) scale(0.9); }
      }
      @keyframes orb-pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.7; }
      }
      .orb-1 { animation: orb-float-1 20s ease-in-out infinite, orb-pulse 8s ease-in-out infinite; }
      .orb-2 { animation: orb-float-2 25s ease-in-out infinite, orb-pulse 10s ease-in-out infinite reverse; }
      .orb-3 { animation: orb-float-1 18s ease-in-out infinite reverse, orb-pulse 6s ease-in-out infinite; }

      /* Magnetic Button Effect */
      .magnetic-btn {
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .magnetic-btn:hover {
        transform: scale(1.05);
      }

      /* 3D Text Layers */
      .text-3d-layer {
        transition: transform 0.1s ease-out;
        will-change: transform;
      }

      /* Glassmorphism Header */
      .glass-header {
        background: rgba(255, 253, 249, 0.8);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(232, 224, 216, 0.5);
      }
      .glass-header.scrolled {
        background: rgba(255, 253, 249, 0.95);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
      }

      /* Count-up Animation */
      @keyframes count-pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.1); }
        100% { transform: scale(1); }
      }
      .count-animate { animation: count-pulse 0.3s ease-out; }

      /* Card 3D Tilt */
      .tilt-card {
        transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        transform-style: preserve-3d;
      }
      .tilt-card:hover {
        transform: perspective(1000px) rotateX(var(--rotateX, 0deg)) rotateY(var(--rotateY, 0deg)) translateZ(20px);
      }

      /* Spotlight Effect */
      .spotlight {
        position: relative;
        overflow: hidden;
      }
      .spotlight::before {
        content: '';
        position: absolute;
        top: var(--mouse-y, 50%);
        left: var(--mouse-x, 50%);
        width: 200px;
        height: 200px;
        background: radial-gradient(circle, rgba(238, 90, 43, 0.15) 0%, transparent 70%);
        transform: translate(-50%, -50%);
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s;
      }
      .spotlight:hover::before { opacity: 1; }

      /* Ripple Effect */
      .ripple {
        position: relative;
        overflow: hidden;
      }
      .ripple::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        background: rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        transition: width 0.6s ease-out, height 0.6s ease-out;
      }
      .ripple:active::after {
        width: 300px;
        height: 300px;
      }

      /* Stagger Reveal */
      @keyframes slide-up-fade {
        from {
          opacity: 0;
          transform: translateY(40px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .stagger-reveal > * {
        opacity: 0;
        animation: slide-up-fade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      /* Shimmer Loading Effect */
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      .shimmer {
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
        background-size: 200% 100%;
        animation: shimmer 2s infinite;
      }

      /* Hero Word Animation */
      .hero-word {
        display: inline-block;
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), text-shadow 0.3s;
      }
      .hero-word:hover {
        transform: translateY(-5px) scale(1.05);
        text-shadow: 0 20px 40px rgba(238, 90, 43, 0.3);
      }

      /* Floating Elements */
      @keyframes float-1 { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(3deg); } }
      @keyframes float-2 { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-15px) rotate(-2deg); } }
      .float-1 { animation: float-1 6s ease-in-out infinite; }
      .float-2 { animation: float-2 8s ease-in-out infinite; }

      /* Glow Effects */
      .glow-accent {
        box-shadow: 0 0 20px rgba(238, 90, 43, 0.3), 0 0 40px rgba(238, 90, 43, 0.1);
      }
      .glow-accent:hover {
        box-shadow: 0 0 30px rgba(238, 90, 43, 0.5), 0 0 60px rgba(238, 90, 43, 0.2);
      }

      /* Text Reveal Mask */
      .text-reveal-mask {
        overflow: hidden;
      }
      .text-reveal-mask > span {
        display: inline-block;
        transform: translateY(100%);
        animation: text-reveal 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      @keyframes text-reveal {
        to { transform: translateY(0); }
      }

      /* ========== MOBILE OPTIMIZATIONS ========== */
      @media (max-width: 640px) {
        .font-display {
          letter-spacing: -0.02em;
        }
        .hero-word {
          letter-spacing: -0.02em;
        }
        /* Disable complex animations on mobile for performance */
        .orb-1, .orb-2, .orb-3 {
          animation-duration: 30s;
          opacity: 0.3;
        }
        .tilt-card {
          transform: none !important;
        }
      }

      /* Touch device optimizations */
      @media (hover: none) and (pointer: coarse) {
        .hero-word:hover {
          transform: none;
          text-shadow: none;
        }
        .magnetic-btn:hover {
          transform: none;
        }
        .tilt-card:hover {
          transform: none;
        }
        .spotlight::before {
          display: none;
        }
      }

      /* Reduced motion preference */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
        .orb-1, .orb-2, .orb-3 {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect, useRef, useCallback, useMemo } = React;
      const { motion, AnimatePresence } = window.Motion;

      // Global Animation Presets
      const SPRING = { type: "spring", stiffness: 100, damping: 20, mass: 1 };
      const FADE_UP = {
        initial: { y: 20, opacity: 0 },
        whileInView: { y: 0, opacity: 1 },
        viewport: { once: true, margin: "-100px" },
        transition: { ...SPRING }
      };
      const STAGGER_CONTAINER = {
        initial: {},
        whileInView: { transition: { staggerChildren: 0.05 } },
        viewport: { once: true, margin: "-100px" }
      };

      // =============================================================================
      // TWEAKS PANEL UI
      // =============================================================================
      const __TWEAKS_STYLE = `
        .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;
          max-height:calc(100vh - 32px);display:flex;flex-direction:column;
          background:rgba(250,249,247,.78);color:#29261b;
          -webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);
          border:.5px solid rgba(255,255,255,.6);border-radius:14px;
          box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);
          font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
        .twk-hd{display:flex;align-items:center;justify-content:space-between;
          padding:10px 8px 10px 14px;cursor:move;user-select:none}
        .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}
        .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);
          width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
        .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
        .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;
          overflow-y:auto;overflow-x:hidden;min-height:0;
          scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent}
        .twk-body::-webkit-scrollbar{width:8px}
        .twk-body::-webkit-scrollbar-track{background:transparent;margin:2px}
        .twk-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px;
          border:2px solid transparent;background-clip:content-box}
        .twk-body::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.25);
          border:2px solid transparent;background-clip:content-box}
        .twk-row{display:flex;flex-direction:column;gap:5px}
        .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
        .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;
          color:rgba(41,38,27,.72)}
        .twk-lbl>span:first-child{font-weight:500}
        .twk-val{color:rgba(41,38,27,.5);font-variant-numeric:tabular-nums}

        .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
          color:rgba(41,38,27,.45);padding:10px 0 0}
        .twk-sect:first-child{padding-top:0}

        .twk-field{appearance:none;width:100%;height:26px;padding:0 8px;
          border:.5px solid rgba(0,0,0,.1);border-radius:7px;
          background:rgba(255,255,255,.6);color:inherit;font:inherit;outline:none}
        .twk-field:focus{border-color:rgba(0,0,0,.25);background:rgba(255,255,255,.85)}
        select.twk-field{padding-right:22px;
          background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='rgba(0,0,0,.5)' d='M0 0h10L5 6z'/></svg>");
          background-repeat:no-repeat;background-position:right 8px center}

        .twk-slider{appearance:none;-webkit-appearance:none;width:100%;height:4px;margin:6px 0;
          border-radius:999px;background:rgba(0,0,0,.12);outline:none}
        .twk-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;
          width:14px;height:14px;border-radius:50%;background:#fff;
          border:.5px solid rgba(0,0,0,.12);box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:default}
        .twk-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;
          background:#fff;border:.5px solid rgba(0,0,0,.12);box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:default}

        .twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;
          background:rgba(0,0,0,.06);user-select:none}
        .twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;
          background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);
          transition:left .15s cubic-bezier(.3,.7,.4,1),width .15s}
        .twk-seg.dragging .twk-seg-thumb{transition:none}
        .twk-seg button{appearance:none;position:relative;z-index:1;flex:1;border:0;
          background:transparent;color:inherit;font:inherit;font-weight:500;min-height:22px;
          border-radius:6px;cursor:default;padding:4px 6px;line-height:1.2;
          overflow-wrap:anywhere}

        .twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:999px;
          background:rgba(0,0,0,.15);transition:background .15s;cursor:default;padding:0}
        .twk-toggle[data-on="1"]{background:#34c759}
        .twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;
          background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s}
        .twk-toggle[data-on="1"] i{transform:translateX(14px)}

        .twk-num{display:flex;align-items:center;height:26px;padding:0 0 0 8px;
          border:.5px solid rgba(0,0,0,.1);border-radius:7px;background:rgba(255,255,255,.6)}
        .twk-num-lbl{font-weight:500;color:rgba(41,38,27,.6);cursor:ew-resize;
          user-select:none;padding-right:8px}
        .twk-num input{flex:1;min-width:0;height:100%;border:0;background:transparent;
          font:inherit;font-variant-numeric:tabular-nums;text-align:right;padding:0 8px 0 0;
          outline:none;color:inherit;-moz-appearance:textfield}
        .twk-num input::-webkit-inner-spin-button,.twk-num input::-webkit-outer-spin-button{
          -webkit-appearance:none;margin:0}
        .twk-num-unit{padding-right:8px;color:rgba(41,38,27,.45)}

        .twk-btn{appearance:none;height:26px;padding:0 12px;border:0;border-radius:7px;
          background:rgba(0,0,0,.78);color:#fff;font:inherit;font-weight:500;cursor:default}
        .twk-btn:hover{background:rgba(0,0,0,.88)}
        .twk-btn.secondary{background:rgba(0,0,0,.06);color:inherit}
        .twk-btn.secondary:hover{background:rgba(0,0,0,.1)}

        .twk-swatch{appearance:none;-webkit-appearance:none;width:56px;height:22px;
          border:.5px solid rgba(0,0,0,.1);border-radius:6px;padding:0;cursor:default;
          background:transparent;flex-shrink:0}
        .twk-swatch::-webkit-color-swatch-wrapper{padding:0}
        .twk-swatch::-webkit-color-swatch{border:0;border-radius:5.5px}
        .twk-swatch::-moz-color-swatch{border:0;border-radius:5.5px}
      `;

      function useTweaks(defaults) {
        const [values, setValues] = React.useState(defaults);
        const setTweak = React.useCallback((keyOrEdits, val) => {
          const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null ? keyOrEdits : { [keyOrEdits]: val };
          setValues((prev) => ({ ...prev, ...edits }));
          window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
          if (edits.accent) document.documentElement.style.setProperty("--accent", edits.accent);
          if (edits.accentSoft) document.documentElement.style.setProperty("--accent-soft", edits.accentSoft);
        }, []);
        return [values, setTweak];
      }

      function TweaksPanel({ title = 'Tweaks', children }) {
        const [open, setOpen] = React.useState(false);
        const dragRef = React.useRef(null);
        const offsetRef = React.useRef({ x: 16, y: 16 });
        const PAD = 16;
        const clampToViewport = React.useCallback(() => {
          const panel = dragRef.current;
          if (!panel) return;
          const w = panel.offsetWidth, h = panel.offsetHeight;
          const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
          const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
          offsetRef.current = {
            x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
            y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
          };
          panel.style.right = offsetRef.current.x + 'px';
          panel.style.bottom = offsetRef.current.y + 'px';
        }, []);
        React.useEffect(() => {
          if (!open) return;
          clampToViewport();
          if (typeof ResizeObserver === 'undefined') {
            window.addEventListener('resize', clampToViewport);
            return () => window.removeEventListener('resize', clampToViewport);
          }
          const ro = new ResizeObserver(clampToViewport);
          ro.observe(document.documentElement);
          return () => ro.disconnect();
        }, [open, clampToViewport]);
        React.useEffect(() => {
          const onMsg = (e) => {
            const t = e?.data?.type;
            if (t === '__activate_edit_mode') setOpen(true);
            else if (t === '__deactivate_edit_mode') setOpen(false);
          };
          window.addEventListener('message', onMsg);
          window.parent.postMessage({ type: '__edit_mode_available' }, '*');
          return () => window.removeEventListener('message', onMsg);
        }, []);
        const dismiss = () => {
          setOpen(false);
          window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
        };
        const onDragStart = (e) => {
          const panel = dragRef.current;
          if (!panel) return;
          const r = panel.getBoundingClientRect();
          const sx = e.clientX, sy = e.clientY;
          const startRight = window.innerWidth - r.right;
          const startBottom = window.innerHeight - r.bottom;
          const move = (ev) => {
            offsetRef.current = {
              x: startRight - (ev.clientX - sx),
              y: startBottom - (ev.clientY - sy),
            };
            clampToViewport();
          };
          const up = () => {
            window.removeEventListener('mousemove', move);
            window.removeEventListener('mouseup', up);
          };
          window.addEventListener('mousemove', move);
          window.addEventListener('mouseup', up);
        };
        if (!open) return null;
        return (
          <>
            <style>{__TWEAKS_STYLE}</style>
            <div ref={dragRef} className="twk-panel" data-noncommentable="" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
              <div className="twk-hd" onMouseDown={onDragStart}>
                <b>{title}</b>
                <button className="twk-x" aria-label="Close tweaks" onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
              </div>
              <div className="twk-body">{children}</div>
            </div>
          </>
        );
      }

      function TweakSection({ title, label, children }) {
        return (
          <>
            <div className="twk-sect">{title || label}</div>
            {children}
          </>
        );
      }

      function TweakRow({ label, value, children, inline = false }) {
        return (
          <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
            <div className="twk-lbl">
              <span>{label}</span>
              {value != null && <span className="twk-val">{value}</span>}
            </div>
            {children}
          </div>
        );
      }

      function TweakToggle({ label, value, onChange }) {
        return (
          <div className="twk-row twk-row-h">
            <div className="twk-lbl"><span>{label}</span></div>
            <button type="button" className="twk-toggle" data-on={value ? '1' : '0'} role="switch" aria-checked={!!value} onClick={() => onChange(!value)}><i /></button>
          </div>
        );
      }

      function TweakRadio({ label, value, options, onChange }) {
        const trackRef = React.useRef(null);
        const [dragging, setDragging] = React.useState(false);
        const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
        const idx = Math.max(0, opts.findIndex((o) => o.value === value));
        const n = opts.length;
        const valueRef = React.useRef(value);
        valueRef.current = value;
        const segAt = (clientX) => {
          const r = trackRef.current.getBoundingClientRect();
          const inner = r.width - 4;
          const i = Math.floor(((clientX - r.left - 2) / inner) * n);
          return opts[Math.max(0, Math.min(n - 1, i))].value;
        };
        const onPointerDown = (e) => {
          setDragging(true);
          const v0 = segAt(e.clientX);
          if (v0 !== valueRef.current) onChange(v0);
          const move = (ev) => {
            if (!trackRef.current) return;
            const v = segAt(ev.clientX);
            if (v !== valueRef.current) onChange(v);
          };
          const up = () => {
            setDragging(false);
            window.removeEventListener('pointermove', move);
            window.removeEventListener('pointerup', up);
          };
          window.addEventListener('pointermove', move);
          window.addEventListener('pointerup', up);
        };
        return (
          <TweakRow label={label}>
            <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown} className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
              <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
              {opts.map((o) => (
                <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>
              ))}
            </div>
          </TweakRow>
        );
      }

      function TweakColor({ label, value, onChange }) {
        return (
          <div className="twk-row twk-row-h">
            <div className="twk-lbl"><span>{label}</span></div>
            <input type="color" className="twk-swatch" value={value} onChange={(e) => onChange(e.target.value)} />
          </div>
        );

          if (!ref.current) return;
          const rect = ref.current.getBoundingClientRect();
          const x = (e.clientX - rect.left) / rect.width;
          const y = (e.clientY - rect.top) / rect.height;
          const rotateX = (y - 0.5) * -10;
          const rotateY = (x - 0.5) * 10;
          setTransform({ rotateX, rotateY });

        const handleMouseLeave = () => {
          setTransform({ rotateX: 0, rotateY: 0 });

        return (
          <motion.div
            ref={ref}
            variants={variants}
            onMouseMove={handleMouseMove}
            onMouseLeave={handleMouseLeave}
            whileHover={{ backgroundColor: "var(--paper-2)", zIndex: 10 }}

      function CinematicIntro() {
        const [done, setDone] = useState(false);
        useEffect(() => { const t = setTimeout(() => setDone(true), 2200); return () => clearTimeout(t); }, []);
        return (
          <AnimatePresence>
            {!done && (
              <motion.div
                key="intro"
                initial={{ opacity: 1 }}
                exit={{ opacity: 0, transition: { duration: 0.7, ease: "easeInOut" } }}

        );

      // ── Text Scramble Hook ───────────────────────────────────────────────────
      function useTextScramble(text, trigger) {
        const [display, setDisplay] = useState(text);
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$";
        useEffect(() => {
          if (!trigger) return;
          let frame = 0;
          const total = 18;
          let raf;
          function tick() {
            setDisplay(text.split("").map((c, i) => {
              if (c === " ") return " ";
              if (frame / total > i / text.length) return c;
              return chars[Math.floor(Math.random() * chars.length)];
            }).join(""));
            frame++;
            if (frame <= total) raf = requestAnimationFrame(tick);
            else setDisplay(text);
          }
          tick();
          return () => cancelAnimationFrame(raf);
        }, [trigger, text]);
        return display;
      }
